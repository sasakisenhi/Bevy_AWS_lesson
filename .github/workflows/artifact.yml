# GitHub Actionsワークフロー定義ファイル。これは、手動トリガーでS3にアーティファクトをアップロードするためのワークフローです。
name: s3-artifact-freeze (manual)

on:
  workflow_dispatch:

jobs:
  artifact-freeze:
    uses: ./.github/workflows/artifact-job.yml
    with:
      aws_region: ${{ vars.AWS_REGION }}
      source_sha: ${{ github.sha }}
      source_branch: ${{ github.ref_name }}
    secrets:
      aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
