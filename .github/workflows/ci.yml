# CI/CDパイプラインのGitHub Actionsワークフロー。これには、変更されたパスの検出、アプリケーションCIの呼び出し、インフラテストの呼び出し、インフラデプロイの呼び出し、およびアーティファクトフリーズの呼び出しが含まれる。
name: CI/CD Pipeline

on:
  pull_request:
    branches: ["main", "master"]
  push:
    branches: ["main", "master"]

permissions:
  contents: read
  id-token: write

concurrency:
  group: ci-cd-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      infra: ${{ steps.filter.outputs.infra }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/app-ci-job.yml'
            infra:
              - 'infra/bevy-platform-infra/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/infra-test-job.yml'
              - '.github/workflows/infra-deploy-job.yml'
              - '.github/workflows/artifact-job.yml'
              - '.github/workflows/infra-ci.yml'
              - '.github/workflows/artifact.yml'

  call-app-ci:
    name: Call App CI
    needs: changes
    if: needs.changes.outputs.app == 'true'
    uses: ./.github/workflows/app-ci-job.yml

  call-infra-test:
    name: Call Infra Test
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    uses: ./.github/workflows/infra-test-job.yml
    with:
      cdk_env: ${{ vars.CDK_ENV }}
      cdk_default_account: ${{ vars.CDK_DEFAULT_ACCOUNT }}
      github_owner: ${{ github.repository_owner }}
      github_repo: ${{ github.event.repository.name }}

  call-infra-deploy:
    name: Call Infra Deploy
    needs: [changes, call-infra-test]
    if: needs.changes.outputs.infra == 'true' && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    uses: ./.github/workflows/infra-deploy-job.yml
    with:
      cdk_env: ${{ vars.CDK_ENV }}
      cdk_default_account: ${{ vars.CDK_DEFAULT_ACCOUNT }}
      aws_region: ${{ vars.AWS_REGION }}
      github_owner: ${{ github.repository_owner }}
      github_repo: ${{ github.event.repository.name }}
      github_branch: ${{ github.ref_name }}
    secrets:
      aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}

  call-artifact:
    name: Call Artifact Freeze
    needs: [changes, call-app-ci, call-infra-deploy]
    if: |
      github.event_name == 'push' &&
      needs.changes.outputs.infra == 'true' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      needs.call-infra-deploy.result == 'success' &&
      (needs.call-app-ci.result == 'success' || needs.call-app-ci.result == 'skipped')
    uses: ./.github/workflows/artifact-job.yml
    with:
      aws_region: ${{ vars.AWS_REGION }}
      source_sha: ${{ github.sha }}
      source_branch: ${{ github.ref_name }}
    secrets:
      aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
