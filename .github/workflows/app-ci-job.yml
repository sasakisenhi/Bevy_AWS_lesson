# Rustのコード品質とセキュリティを確保するためのGitHub Actionsワークフロー。
# これには、コードのフォーマットチェック、禁止されたファイルの検出、ライセンステキストの確認、
# ユニットテストの実行、およびClippyによるコード品質の検査が含まれる。さらに、
# CDK Nagの警告を抑制するためのコメントも含まれている。
name: app-ci-job

on:
  workflow_call:

permissions:
  contents: read

jobs:
  app-ci:
    name: PR Gate (fast & strict)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Check forbidden files
        run: |
          forbidden_files=(
            ".env"
            ".env.local"
            "*.pem"
            "*.key"
            "*.p12"
            "id_rsa"
          )

          for pattern in "${forbidden_files[@]}"; do
            if find . -name "$pattern" | grep -q .; then
              echo "Forbidden file detected: $pattern"
              exit 1
            fi
          done

      - name: Check license file
        run: |
          if [ ! -f LICENSE ] && [ ! -f LICENSE.md ]; then
            echo "LICENSE file is missing"
            exit 1
          fi

      - name: Cargo check (fast)
        run: cargo check -p game_core -p game_logic --locked

      - name: Run unit tests (core)
        run: cargo test -p game_core --locked

      - name: Run unit tests (logic)
        run: cargo test -p game_logic --locked

      - name: Clippy (core)
        run: cargo clippy -p game_core -- -D warnings

      - name: Clippy (logic)
        run: cargo clippy -p game_logic -- -D warnings

        # CDK Nagの警告を抑制するためのコメント。理由は、GitHub Actionsが動的なオブジェクトキーとCloudFormationスタックIDサフィックスを扱うため、リソース末尾ワイルドカードが必要になるため。
      - name: Build workspace
        run: cargo build -p game_core -p game_logic --locked
